services:
  - type: web
    name: job-tracker-api
    env: java
    rootDir: .
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/job-tracker-0.0.1-SNAPSHOT.jar
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION_MS
        value: "86400000"
      - key: APP_ALLOWED_ORIGIN_PATTERNS
        sync: false
