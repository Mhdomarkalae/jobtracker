services:
  - type: web
    name: job-tracker-api
    runtime: docker
    plan: free
    rootDir: .
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION_MS
        value: "86400000"
      - key: APP_ALLOWED_ORIGIN_PATTERNS
        sync: false
      - key: APP_COOKIE_SAME_SITE
        value: "None"
      - key: APP_COOKIE_SECURE
        value: "true"
