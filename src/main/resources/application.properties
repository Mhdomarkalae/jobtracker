spring.application.name=job-tracker
server.port=${PORT:8080}
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100
spring.jackson.serialization.write-dates-as-timestamps=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.url=${FLYWAY_URL:${spring.datasource.url}}
spring.flyway.user=${FLYWAY_USER:${spring.datasource.username}}
spring.flyway.password=${FLYWAY_PASSWORD:${spring.datasource.password}}

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
app.cors.allowed-origin-patterns=${APP_ALLOWED_ORIGIN_PATTERNS:http://localhost:5173,http://127.0.0.1:5173}
app.security.cookie-secure=${APP_COOKIE_SECURE:true}
app.security.cookie-domain=${APP_COOKIE_DOMAIN:}
app.security.session-cookie-name=${APP_SESSION_COOKIE_NAME:JT_SESSION}
app.security.session-cookie-path=${APP_SESSION_COOKIE_PATH:/}
app.security.csrf-cookie-name=${APP_CSRF_COOKIE_NAME:XSRF-TOKEN}
app.security.csrf-header-name=${APP_CSRF_HEADER_NAME:X-XSRF-TOKEN}
