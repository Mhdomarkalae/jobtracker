spring.application.name=job-tracker
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/job_tracker_db}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100
spring.jackson.serialization.write-dates-as-timestamps=false

app.jwt.secret=${JWT_SECRET:change-me-in-production-change-me-in-production}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.cors.allowed-origin-patterns=${APP_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
